; Xdebug 3 — disabled by default for performance
; To enable: set XDEBUG_MODE=debug in .env or docker-compose environment
; and uncomment the zend_extension line below, then restart app container
;zend_extension=xdebug
xdebug.mode=${XDEBUG_MODE}
xdebug.start_with_request=trigger
xdebug.discover_client_host=0
xdebug.client_host=host.docker.internal
xdebug.client_port=9003
xdebug.log_level=0